include:
  - ~/dotfiles/private/genius_api_key.yaml

directory: ~/Music
library: ~/.config/beets/library.db

# Spotify works as a metadata source for albums not on MusicBrainz.
# The plugin ships with working API credentials, so no token is needed.
# `beet import` usually auto-matches via Spotify search. If it doesn't,
# press `I` (enter Id) at the prompt and paste the full
# https://open.spotify.com/album/... URL (the https form, not spotify:album:)
plugins: musicbrainz spotify play lyrics mpdupdate fetchart embedart rewrite
import:
    move: yes
play:
    command: mpv
fetchart:
    # Spotify's album_for_id doesn't return cover art, so pull it from
    # these sources during import. `spotify` reuses the matched album id
    sources:
        - filesystem
        - coverart
        - itunes
        - amazon
        - spotify
embedart:
    # Embed the fetched cover into each file's tags. ImageMagick is
    # installed, so resizing and compare_threshold are available
    remove_art_file: yes
lyrics:
    sources: lrclib genius
    # This writes lyrics to the ID3/Vorbis tag,
    # the lyrics live within the song
    synced: yes
    force: yes
    keep_synced: yes
    auto: yes
    # This allows slight differences in title matching
    title_diff: 2 
mpdupdate:
    host: 127.0.0.1
    port: 6600
rewrite:
    # Some artists have releases under multiple names or
    # their names are different on Musixmatch vs Genius
    artist Alessandro Mannarino: Mannarino
